server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # face-api.js model weight files — served as-is, no special handling needed
    location /models/ {
        try_files $uri =404;
    }

    # React Router / client-side routing — always fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
